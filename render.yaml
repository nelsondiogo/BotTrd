services:
  - type: web
    name: nd-bot-hft-ultra
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: BYBIT_USE_TESTNET
        value: "false"
      - key: PORT
        value: "3000"
